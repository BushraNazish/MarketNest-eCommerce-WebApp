spring:
  application:
    name: marketplace-backend
  profiles:
    active: dev
  
  datasource:
    url: jdbc:postgresql://localhost:5432/markethub_db
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 60000
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  private-key: classpath:keys/private_key.pem
  public-key: classpath:keys/public_key.pem
  access-token-expiry: 900000  # 15 minutes
  refresh-token-expiry: 604800000  # 7 days

razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_0lvzwhFlbW5MNz}
  key-secret: ${RAZORPAY_KEY_SECRET:f1EubYPxpAKfHi03iBriFcmP}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}

sendgrid:
  api-key: ${SENDGRID_API_KEY:dummy}
  from-email: noreply@markethub.com
  from-name: MarketHub

msg91:
  auth-key: ${MSG91_AUTH_KEY:dummy}
  sender-id: MKTHUB
  route: 4

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dummy}
  api-key: ${CLOUDINARY_API_KEY:dummy}
  api-secret: ${CLOUDINARY_API_SECRET:dummy}

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  file:
    name: backend.log
  level:
    com.markethub: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: TRACE
